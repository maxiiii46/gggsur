version: '3.8'

services:
  web-app:
    build: .
    container_name: tienda_flask_app
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db_mysql
      - DB_USER=root
      - DB_PASSWORD=tu_password_seguro
      - DB_NAME=tienda_db
    depends_on:
      db_mysql:
        condition: service_healthy
    networks:
      - red-tienda

  db_mysql:
    image: mysql:8.0
    container_name: tienda_mysql_db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=tu_password_seguro
      - MYSQL_DATABASE=tienda_db
    ports:
      - "3306:3306"
    volumes:
      - datos_mysql:/var/lib/mysql
    networks:
      - red-tienda
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

volumes:
  datos_mysql:

networks:
  red-tienda:
    driver: bridge
